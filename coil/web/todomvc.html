<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coil • TodoMVC (written in Coil, compiled to WebAssembly)</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body { font: 15px/1.4 system-ui, "Helvetica Neue", Arial, sans-serif; background: #f5f5f5; color: #111;
           margin: 0; padding: 0 0 4rem; -webkit-font-smoothing: antialiased; }
    @media (prefers-color-scheme: dark) { body { background: #16181d; color: #e6e6e6; } }

    .todoapp { max-width: 34rem; margin: 3rem auto 0; background: #fff; box-shadow: 0 2px 4px rgba(0,0,0,.15), 0 25px 50px rgba(0,0,0,.1); }
    @media (prefers-color-scheme: dark) { .todoapp { background: #22252c; box-shadow: 0 2px 4px rgba(0,0,0,.4); } }

    .header h1 { position: absolute; width: 100%; top: -1.2rem; margin: 0; text-align: center;
                 font-size: 5rem; font-weight: 200; color: #b83f45; opacity: .85; }
    .header { position: relative; padding-top: 3.5rem; }
    .new-todo { width: 100%; padding: 1rem 1rem 1rem 3.6rem; border: none; font-size: 1.5rem; line-height: 1.4;
                background: rgba(0,0,0,.003); box-shadow: inset 0 -2px 1px rgba(0,0,0,.03); color: inherit; }
    .new-todo:focus { outline: none; }

    .todo-list { list-style: none; margin: 0; padding: 0; }
    .todo-list li { position: relative; display: flex; align-items: center; gap: .75rem; font-size: 1.5rem;
                    padding: .8rem 1rem; border-bottom: 1px solid #ededed; }
    @media (prefers-color-scheme: dark) { .todo-list li { border-bottom-color: #2e323b; } }
    .todo-list .toggle { width: 1.6rem; height: 1.6rem; flex: none; accent-color: #b83f45; }
    .todo-list label { flex: 1; word-break: break-all; cursor: default; }
    .todo-list li.completed label { color: #949494; text-decoration: line-through; }
    .todo-list .destroy { flex: none; border: none; background: none; color: #949494; font-size: 1.7rem;
                          line-height: 1; cursor: pointer; opacity: .6; }
    .todo-list .destroy:hover { color: #c18585; opacity: 1; }

    /* the ONLY thing filters do: Coil sets these classes; CSS hides the rest */
    .todo-list.filtered-active li.completed { display: none; }
    .todo-list.filtered-completed li:not(.completed) { display: none; }

    .footer { display: flex; align-items: center; justify-content: space-between; gap: .5rem;
              padding: .6rem 1rem; font-size: .85rem; color: #777; flex-wrap: wrap; }
    .todo-count strong { font-weight: 600; color: inherit; }
    .filters { display: flex; gap: .4rem; list-style: none; margin: 0; padding: 0; }
    .filters a { padding: .15rem .5rem; border: 1px solid transparent; border-radius: .25rem;
                 text-decoration: none; color: inherit; }
    .filters a:hover { border-color: rgba(184,63,69,.25); }
    .clear-completed { border: none; background: none; color: #777; cursor: pointer; }
    .clear-completed:hover { text-decoration: underline; }

    .credit { max-width: 34rem; margin: 1.5rem auto; text-align: center; color: #999; font-size: .8rem; }
    .credit code { background: rgba(128,128,128,.15); padding: .05rem .3rem; border-radius: .25rem; }
  </style>
</head>
<body>
  <!-- The entire app (markup + state + logic) is built by todomvc.wasm, compiled
       from todomvc.coil. This document only bootstraps the module. -->
  <script type="module">
    import { runCoil } from './js-bridge.js';
    runCoil('./todomvc.wasm').catch((e) => {
      document.body.innerHTML = '<pre style="color:#c00;padding:2rem">' + e.stack + '</pre>';
    });
  </script>
  <p class="credit">Everything above is constructed and driven by a WebAssembly module
    compiled from <code>todomvc.coil</code>. The only JavaScript is the app-agnostic
    <code>js-bridge.js</code>. Serve over HTTP — <code>file://</code> won't load wasm.</p>
</body>
</html>
