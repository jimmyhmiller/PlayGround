[package]
name = "clojure-stub"
version = "0.0.1"
edition = "2021"
description = "A mini-Clojure frontend with its OWN procedural macro expander, built on the toolkit's public API (which has no macro system of its own)."

[dependencies]
microlang = { path = ".." }

[features]
# Run the clojure frontend on the native JIT tier (for tests/jit.rs).
jit = ["microlang/jit"]

[lib]
path = "src/lib.rs"

[[bin]]
name = "clojure-stub"
path = "src/main.rs"
