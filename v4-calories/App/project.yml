name: CumulativeTracker
options:
  bundleIdPrefix: com.jimmyhmiller
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  CalorieModel:
    path: ..

targets:
  CumulativeTracker:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: CalorieModel
        product: CalorieModel
    entitlements:
      path: CumulativeTracker.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
    info:
      path: Generated-Info.plist
      properties:
        CFBundleDisplayName: Cumulative
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSHealthShareUsageDescription: "Reads your active energy, resting energy, and weight so the app can learn your true calorie burn and reconcile your cumulative deficit against the scale."
        NSHealthUpdateUsageDescription: "Lets you save weigh-ins and logged calories back to Apple Health."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jimmyhmiller.CumulativeTracker
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        SWIFT_STRICT_CONCURRENCY: minimal
        TARGETED_DEVICE_FAMILY: "1"
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
