[package]
name = "book-ui-wgpu"
version = "0.1.0"
edition = "2024"

[dependencies]
winit = "0.30"
wgpu = "27"
pollster = "0.4"
glam = { version = "0.30", features = ["bytemuck"] }
bytemuck = { version = "1", features = ["derive"] }
lyon = "1.0"
ttf-parser = "0.25"
egui = "0.33"
egui-wgpu = "0.33"
egui-winit = { version = "0.33", default-features = false, features = ["links"] }

[[bin]]
name = "book-ui-wgpu"
path = "src/main.rs"
