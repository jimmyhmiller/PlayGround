<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Visualizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: #111; overflow: hidden; }
        #app {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        #editor-pane {
            width: 400px;
            min-width: 200px;
            max-width: 80vw;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #1a1b26;
            flex-shrink: 0;
        }
        #editor-header {
            padding: 6px 8px;
            font-family: monospace;
            font-size: 12px;
            color: #565f89;
            border-bottom: 1px solid #2a2b36;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #scene-select {
            background: #2a2b36;
            color: #c0caf5;
            border: 1px solid #3a3b46;
            padding: 4px 8px;
            font-family: inherit;
            font-size: 12px;
            border-radius: 3px;
            cursor: pointer;
        }
        #editor-header label {
            color: #565f89;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #editor-container {
            flex: 1;
            overflow: hidden;
        }
        #resize-handle {
            width: 5px;
            cursor: col-resize;
            background: #2a2b36;
            flex-shrink: 0;
            transition: background 0.15s;
        }
        #resize-handle:hover, #resize-handle.dragging {
            background: #7aa2f7;
        }
        #canvas-pane {
            flex: 1;
            position: relative;
            min-width: 200px;
        }
        #controls {
            position: absolute;
            top: 12px;
            left: 12px;
            display: flex;
            gap: 8px;
            z-index: 100;
            font-family: monospace;
            font-size: 12px;
        }
        #controls button {
            background: #1a1b26;
            color: #c0caf5;
            border: 1px solid #2a2b36;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-family: inherit;
            font-size: inherit;
            transition: background 0.15s;
        }
        #controls button:hover {
            background: #2a2b36;
        }
        #controls button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .cm-editor {
            height: 100% !important;
            font-size: 14px !important;
        }
        .cm-editor .cm-scroller {
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace !important;
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="editor-pane">
            <div id="editor-header">
                <label>scene</label>
                <select id="scene-select"></select>
            </div>
            <div id="editor-container"></div>
        </div>
        <div id="resize-handle"></div>
        <div id="canvas-pane">
            <div id="controls">
                <button id="btn-back" title="Back (←)">← back</button>
                <button id="btn-step" title="Step (→ or space)">step →</button>
            </div>
        </div>
    </div>

    <script>
        const handle = document.getElementById('resize-handle');
        const editorPane = document.getElementById('editor-pane');
        let dragging = false;

        handle.addEventListener('mousedown', (e) => {
            dragging = true;
            handle.classList.add('dragging');
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
            e.preventDefault();
        });

        window.addEventListener('mousemove', (e) => {
            if (!dragging) return;
            const newWidth = Math.min(Math.max(e.clientX, 200), window.innerWidth * 0.8);
            editorPane.style.width = newWidth + 'px';
        });

        window.addEventListener('mouseup', () => {
            if (!dragging) return;
            dragging = false;
            handle.classList.remove('dragging');
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
        });

        // Step controls
        document.getElementById('btn-back').addEventListener('click', () => {
            if (window.__stepBack) window.__stepBack();
        });
        document.getElementById('btn-step').addEventListener('click', () => {
            if (window.__step) window.__step();
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.closest('.cm-editor')) return;
            if (e.key === 'ArrowLeft') {
                if (window.__stepBack) window.__stepBack();
                e.preventDefault();
            } else if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') {
                if (window.__step) window.__step();
                e.preventDefault();
            }
        });
    </script>

    <script type="importmap">
    {
        "imports": {
            "codemirror": "https://esm.sh/codemirror@6.0.1",
            "@codemirror/lang-javascript": "https://esm.sh/@codemirror/lang-javascript@6.2.2",
            "@codemirror/theme-one-dark": "https://esm.sh/@codemirror/theme-one-dark@6.1.2",
            "@codemirror/view": "https://esm.sh/@codemirror/view@6.36.5",
            "@codemirror/state": "https://esm.sh/@codemirror/state@6.5.2"
        }
    }
    </script>

    <script type="module">
        import { basicSetup, EditorView } from 'codemirror';
        import { javascript } from '@codemirror/lang-javascript';
        import { oneDark } from '@codemirror/theme-one-dark';

        // Load scene list and remember the last selection
        const scenes = await fetch('/scenes').then(r => r.json()).catch(() => []);
        const sceneSelect = document.getElementById('scene-select');
        for (const name of scenes) {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            sceneSelect.appendChild(opt);
        }
        let currentScene = localStorage.getItem('scene') || scenes[0] || '';
        if (scenes.includes(currentScene)) {
            sceneSelect.value = currentScene;
        } else {
            currentScene = scenes[0] || '';
        }

        async function fetchScene(name) {
            return await fetch(`/scenes/${name}`).then(r => r.text()).catch(() => '');
        }

        const initialDoc = currentScene ? await fetchScene(currentScene) : '';

        // Flag: suppress onCodeChange callback when content is pushed from server
        let suppressUpdate = false;

        const updateListener = EditorView.updateListener.of((update) => {
            if (update.docChanged && !suppressUpdate) {
                const code = update.state.doc.toString();
                if (window.__onCodeChange) {
                    try {
                        window.__onCodeChange(code);
                    } catch (e) {
                        console.error('[editor] onCodeChange threw:', e);
                    }
                }
            }
        });

        const editor = new EditorView({
            doc: initialDoc,
            extensions: [
                basicSetup,
                javascript(),
                oneDark,
                updateListener,
                EditorView.theme({
                    '&': { backgroundColor: '#1a1b26' },
                    '.cm-gutters': { backgroundColor: '#1a1b26', borderRight: '1px solid #2a2b36' },
                    '.cm-activeLineGutter': { backgroundColor: '#1e1f2b' },
                    '.cm-activeLine': { backgroundColor: '#1e1f2b' },
                }),
            ],
            parent: document.getElementById('editor-container'),
        });

        window.__editor = editor;

        function replaceEditorContent(newCode) {
            suppressUpdate = true;
            editor.dispatch({
                changes: { from: 0, to: editor.state.doc.length, insert: newCode }
            });
            suppressUpdate = false;
            if (window.__onCodeChange) {
                window.__onCodeChange(newCode);
            }
        }

        // Scene switcher
        sceneSelect.addEventListener('change', async () => {
            currentScene = sceneSelect.value;
            localStorage.setItem('scene', currentScene);
            const content = await fetchScene(currentScene);
            replaceEditorContent(content);
        });

        const wasm = await import('./visualizer.js');
        await wasm.default();

        // Trigger initial compile after wasm is loaded
        if (window.__onCodeChange) {
            window.__onCodeChange(editor.state.doc.toString());
        }

        // Subscribe to server-sent updates — only apply changes for the current scene
        const evtSource = new EventSource('/events');
        evtSource.onmessage = (e) => {
            try {
                const update = JSON.parse(e.data);
                if (update.name !== currentScene) return;
                if (update.content === editor.state.doc.toString()) return;
                replaceEditorContent(update.content);
                console.log('[sse] updated', update.name, update.content.length, 'chars');
            } catch (err) {
                console.warn('[sse] bad payload:', err);
            }
        };
        evtSource.onerror = (e) => {
            console.warn('[sse] connection error', e);
        };
    </script>
</body>
</html>
