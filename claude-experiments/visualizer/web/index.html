<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Visualizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: #111; overflow: hidden; }
        #app {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        #editor-pane {
            width: 400px;
            min-width: 200px;
            max-width: 80vw;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: #1a1b26;
            flex-shrink: 0;
        }
        #editor-header {
            padding: 6px 8px;
            font-family: monospace;
            font-size: 12px;
            color: #565f89;
            border-bottom: 1px solid #2a2b36;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #scene-select {
            background: #2a2b36;
            color: #c0caf5;
            border: 1px solid #3a3b46;
            padding: 4px 8px;
            font-family: inherit;
            font-size: 12px;
            border-radius: 3px;
            cursor: pointer;
        }
        #editor-header label {
            color: #565f89;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #editor-container {
            flex: 1;
            overflow: hidden;
        }
        #resize-handle {
            width: 5px;
            cursor: col-resize;
            background: #2a2b36;
            flex-shrink: 0;
            transition: background 0.15s;
        }
        #resize-handle:hover, #resize-handle.dragging {
            background: #7aa2f7;
        }
        #canvas-pane {
            flex: 1;
            position: relative;
            min-width: 200px;
        }
        #controls {
            position: absolute;
            top: 12px;
            left: 12px;
            display: flex;
            gap: 8px;
            z-index: 100;
            font-family: monospace;
            font-size: 12px;
        }
        #controls button {
            background: #1a1b26;
            color: #c0caf5;
            border: 1px solid #2a2b36;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-family: inherit;
            font-size: inherit;
            transition: background 0.15s;
        }
        #controls button:hover {
            background: #2a2b36;
        }
        #controls button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        #style-panel {
            position: absolute;
            bottom: 12px;
            left: 12px;
            width: 260px;
            z-index: 100;
            background: rgba(26, 27, 38, 0.92);
            border: 1px solid #2a2b36;
            border-radius: 6px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: #c0caf5;
            backdrop-filter: blur(6px);
            max-height: calc(100vh - 24px);
            overflow-y: auto;
        }
        #style-panel.collapsed .style-body { display: none; }
        #style-panel .style-header {
            padding: 8px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2b36;
            cursor: pointer;
            user-select: none;
        }
        #style-panel.collapsed .style-header { border-bottom: none; }
        #style-panel .style-header .title {
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #7aa2f7;
            font-size: 10px;
        }
        #style-panel .style-header .caret { color: #565f89; }
        #style-panel .style-body {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #style-panel .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        #style-panel .row label {
            color: #565f89;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 10px;
            flex: 1;
        }
        #style-panel select,
        #style-panel input[type=number],
        #style-panel input[type=text] {
            background: #1a1b26;
            color: #c0caf5;
            border: 1px solid #2a2b36;
            padding: 3px 6px;
            font-family: inherit;
            font-size: 11px;
            border-radius: 3px;
        }
        #style-panel input[type=color] {
            width: 28px;
            height: 20px;
            border: 1px solid #2a2b36;
            background: transparent;
            padding: 0;
            border-radius: 3px;
            cursor: pointer;
        }
        #style-panel input[type=range] {
            flex: 1;
            accent-color: #7aa2f7;
        }
        #style-panel .accents {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }
        #style-panel .accents input[type=color] { width: 100%; height: 24px; }
        #style-panel .section-label {
            color: #565f89;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 10px;
            margin-top: 2px;
        }
        #style-panel .copy-btn {
            background: #1a1b26;
            color: #7aa2f7;
            border: 1px solid #2a2b36;
            padding: 5px 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
            border-radius: 3px;
            text-align: center;
        }
        #style-panel .copy-btn:hover { background: #2a2b36; }
        /* Presentation mode */
        #app.present #editor-pane,
        #app.present #resize-handle,
        #app.present #style-panel {
            display: none;
        }
        #app.present #controls {
            display: none;
        }
        #app.present.show-controls #controls {
            display: flex;
        }
        .cm-editor {
            height: 100% !important;
            font-size: 14px !important;
        }
        .cm-editor .cm-scroller {
            font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace !important;
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="editor-pane">
            <div id="editor-header">
                <label>scene</label>
                <select id="scene-select"></select>
            </div>
            <div id="editor-container"></div>
        </div>
        <div id="resize-handle"></div>
        <div id="canvas-pane">
            <div id="controls">
                <button id="btn-back" title="Back (←)">← back</button>
                <button id="btn-step" title="Step (→ or space)">step →</button>
            </div>
            <div id="style-panel" class="collapsed">
                <div class="style-header" id="style-header">
                    <span class="title">style</span>
                    <span class="caret">▸</span>
                </div>
                <div class="style-body">
                    <div class="row">
                        <label>preset</label>
                        <select id="theme-preset"></select>
                    </div>
                    <div class="row">
                        <label>background</label>
                        <input type="color" id="theme-bg">
                    </div>
                    <div class="row">
                        <label>stroke</label>
                        <input type="color" id="theme-stroke">
                    </div>
                    <div class="row">
                        <label>label</label>
                        <input type="color" id="theme-label">
                    </div>
                    <div class="row">
                        <label>stroke width</label>
                        <input type="range" id="theme-stroke-width" min="0" max="4" step="0.05">
                        <span id="theme-stroke-width-val" style="width: 28px; text-align: right; color: #565f89;">1.25</span>
                    </div>
                    <div class="section-label">accents</div>
                    <div class="accents" id="theme-accents"></div>
                    <div class="section-label">grain</div>
                    <div class="row">
                        <label><input type="checkbox" id="theme-grain-enabled"> enabled</label>
                    </div>
                    <div class="row">
                        <label>intensity</label>
                        <input type="range" id="theme-grain-intensity" min="0" max="0.5" step="0.01">
                        <span id="theme-grain-intensity-val" style="width: 28px; text-align: right; color: #565f89;">0.08</span>
                    </div>
                    <div class="section-label">motion</div>
                    <div class="row">
                        <label>stiffness</label>
                        <input type="range" id="theme-spring-stiffness" min="20" max="800" step="5">
                        <span id="theme-spring-stiffness-val" style="width: 32px; text-align: right; color: #565f89;"></span>
                    </div>
                    <div class="row">
                        <label>damping</label>
                        <input type="range" id="theme-spring-damping" min="1" max="50" step="0.5">
                        <span id="theme-spring-damping-val" style="width: 32px; text-align: right; color: #565f89;"></span>
                    </div>
                    <div class="row">
                        <label>duration</label>
                        <input type="range" id="theme-tween-duration" min="0.05" max="2.0" step="0.05">
                        <span id="theme-tween-duration-val" style="width: 32px; text-align: right; color: #565f89;"></span>
                    </div>
                    <div class="row">
                        <label>easing</label>
                        <select id="theme-tween-easing"></select>
                    </div>
                    <button class="copy-btn" id="theme-copy">copy as rust preset</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const app = document.getElementById('app');

        const handle = document.getElementById('resize-handle');
        const editorPane = document.getElementById('editor-pane');
        let dragging = false;

        handle.addEventListener('mousedown', (e) => {
            dragging = true;
            handle.classList.add('dragging');
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
            e.preventDefault();
        });

        window.addEventListener('mousemove', (e) => {
            if (!dragging) return;
            const newWidth = Math.min(Math.max(e.clientX, 200), window.innerWidth * 0.8);
            editorPane.style.width = newWidth + 'px';
        });

        window.addEventListener('mouseup', () => {
            if (!dragging) return;
            dragging = false;
            handle.classList.remove('dragging');
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
        });

        // Step controls
        document.getElementById('btn-back').addEventListener('click', () => {
            if (window.__stepBack) window.__stepBack();
        });
        document.getElementById('btn-step').addEventListener('click', () => {
            if (window.__step) window.__step();
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.closest('.cm-editor')) return;
            if (e.key === 'ArrowLeft') {
                if (window.__stepBack) window.__stepBack();
                e.preventDefault();
            } else if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') {
                if (window.__step) window.__step();
                e.preventDefault();
            } else if (e.key === 'p') {
                const entering = !app.classList.contains('present');
                app.classList.toggle('present', entering);
                if (entering) app.classList.add('show-controls');
            } else if (e.key === 'c') {
                app.classList.toggle('show-controls');
            }
        });
    </script>

    <script type="module">
        import { basicSetup, EditorView, javascript, oneDark, rainbowBrackets } from './editor.bundle.js';

        // Load scene list and remember the last selection
        const scenes = await fetch('/scenes').then(r => r.json()).catch(() => []);
        const sceneSelect = document.getElementById('scene-select');
        for (const name of scenes) {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            sceneSelect.appendChild(opt);
        }
        let currentScene = localStorage.getItem('scene') || scenes[0] || '';
        if (scenes.includes(currentScene)) {
            sceneSelect.value = currentScene;
        } else {
            currentScene = scenes[0] || '';
        }

        async function fetchScene(name) {
            return await fetch(`/scenes/${name}`).then(r => r.text()).catch(() => '');
        }

        const initialDoc = currentScene ? await fetchScene(currentScene) : '';

        // Flag: suppress onCodeChange callback when content is pushed from server
        let suppressUpdate = false;

        const updateListener = EditorView.updateListener.of((update) => {
            if (update.docChanged && !suppressUpdate) {
                const code = update.state.doc.toString();
                if (window.__onCodeChange) {
                    try {
                        window.__onCodeChange(code);
                    } catch (e) {
                        console.error('[editor] onCodeChange threw:', e);
                    }
                }
            }
        });

        const editor = new EditorView({
            doc: initialDoc,
            extensions: [
                basicSetup,
                javascript(),
                oneDark,
                rainbowBrackets(),
                updateListener,
                EditorView.theme({
                    '&': { backgroundColor: '#1a1b26' },
                    '.cm-gutters': { backgroundColor: '#1a1b26', borderRight: '1px solid #2a2b36' },
                    '.cm-activeLineGutter': { backgroundColor: '#1e1f2b' },
                    '.cm-activeLine': { backgroundColor: '#1e1f2b' },
                }),
            ],
            parent: document.getElementById('editor-container'),
        });

        window.__editor = editor;

        function replaceEditorContent(newCode) {
            suppressUpdate = true;
            editor.dispatch({
                changes: { from: 0, to: editor.state.doc.length, insert: newCode }
            });
            suppressUpdate = false;
            if (window.__onCodeChange) {
                window.__onCodeChange(newCode);
            }
        }

        // Scene switcher
        sceneSelect.addEventListener('change', async () => {
            currentScene = sceneSelect.value;
            localStorage.setItem('scene', currentScene);
            const content = await fetchScene(currentScene);
            replaceEditorContent(content);
        });

        const wasm = await import('./visualizer.js');
        await wasm.default();

        // ── Style panel ──
        const styleHeader = document.getElementById('style-header');
        const stylePanel = document.getElementById('style-panel');
        styleHeader.addEventListener('click', () => {
            stylePanel.classList.toggle('collapsed');
            styleHeader.querySelector('.caret').textContent =
                stylePanel.classList.contains('collapsed') ? '▸' : '▾';
        });

        const presetSelect = document.getElementById('theme-preset');
        const bgInput = document.getElementById('theme-bg');
        const strokeInput = document.getElementById('theme-stroke');
        const labelInput = document.getElementById('theme-label');
        const strokeWidthInput = document.getElementById('theme-stroke-width');
        const strokeWidthVal = document.getElementById('theme-stroke-width-val');
        const grainEnabledInput = document.getElementById('theme-grain-enabled');
        const grainIntensityInput = document.getElementById('theme-grain-intensity');
        const grainIntensityVal = document.getElementById('theme-grain-intensity-val');
        const accentsDiv = document.getElementById('theme-accents');
        const copyBtn = document.getElementById('theme-copy');
        const stiffInput = document.getElementById('theme-spring-stiffness');
        const stiffVal = document.getElementById('theme-spring-stiffness-val');
        const dampInput = document.getElementById('theme-spring-damping');
        const dampVal = document.getElementById('theme-spring-damping-val');
        const durInput = document.getElementById('theme-tween-duration');
        const durVal = document.getElementById('theme-tween-duration-val');
        const easingSelect = document.getElementById('theme-tween-easing');

        const easings = [
            'linear', 'quad-in', 'quad-out', 'quad-in-out',
            'cubic-in', 'cubic-out', 'cubic-in-out',
            'elastic-in', 'elastic-out', 'elastic-in-out',
            'bounce-in', 'bounce-out', 'bounce-in-out',
            'back-in', 'back-out', 'back-in-out',
        ];
        for (const name of easings) {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            easingSelect.appendChild(opt);
        }

        // Populate presets
        const presetNames = JSON.parse(wasm.theme_preset_names());
        for (const name of presetNames) {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            presetSelect.appendChild(opt);
        }

        function recompile() {
            if (window.__onCodeChange) {
                window.__onCodeChange(editor.state.doc.toString());
            }
        }

        function readTheme() {
            return JSON.parse(wasm.theme_get_json());
        }

        function renderTheme() {
            const t = readTheme();
            presetSelect.value = t.name;
            bgInput.value = t.background;
            strokeInput.value = t.stroke;
            labelInput.value = t.label;
            strokeWidthInput.value = t.stroke_width;
            strokeWidthVal.textContent = Number(t.stroke_width).toFixed(2);
            grainEnabledInput.checked = !!t.grain_enabled;
            grainIntensityInput.value = t.grain_intensity;
            grainIntensityVal.textContent = Number(t.grain_intensity).toFixed(2);
            stiffInput.value = t.spring_stiffness;
            stiffVal.textContent = Number(t.spring_stiffness).toFixed(0);
            dampInput.value = t.spring_damping;
            dampVal.textContent = Number(t.spring_damping).toFixed(1);
            durInput.value = t.tween_duration;
            durVal.textContent = Number(t.tween_duration).toFixed(2);
            easingSelect.value = t.tween_easing;

            accentsDiv.innerHTML = '';
            t.accents.forEach((hex, i) => {
                const input = document.createElement('input');
                input.type = 'color';
                input.value = hex;
                input.addEventListener('input', () => {
                    wasm.theme_set_accent(i, input.value);
                    recompile();
                });
                accentsDiv.appendChild(input);
            });
        }

        presetSelect.addEventListener('change', () => {
            wasm.theme_set_preset(presetSelect.value);
            renderTheme();
            recompile();
        });

        bgInput.addEventListener('input', () => {
            wasm.theme_set_field('background', bgInput.value);
        });
        strokeInput.addEventListener('input', () => {
            wasm.theme_set_field('stroke', strokeInput.value);
        });
        labelInput.addEventListener('input', () => {
            wasm.theme_set_field('label', labelInput.value);
        });
        strokeWidthInput.addEventListener('input', () => {
            wasm.theme_set_field('stroke_width', strokeWidthInput.value);
            strokeWidthVal.textContent = Number(strokeWidthInput.value).toFixed(2);
        });
        grainEnabledInput.addEventListener('change', () => {
            wasm.theme_set_field('grain_enabled', grainEnabledInput.checked ? 'true' : 'false');
        });
        grainIntensityInput.addEventListener('input', () => {
            wasm.theme_set_field('grain_intensity', grainIntensityInput.value);
            grainIntensityVal.textContent = Number(grainIntensityInput.value).toFixed(2);
        });
        stiffInput.addEventListener('input', () => {
            wasm.theme_set_field('spring_stiffness', stiffInput.value);
            stiffVal.textContent = Number(stiffInput.value).toFixed(0);
            recompile();
        });
        dampInput.addEventListener('input', () => {
            wasm.theme_set_field('spring_damping', dampInput.value);
            dampVal.textContent = Number(dampInput.value).toFixed(1);
            recompile();
        });
        durInput.addEventListener('input', () => {
            wasm.theme_set_field('tween_duration', durInput.value);
            durVal.textContent = Number(durInput.value).toFixed(2);
            recompile();
        });
        easingSelect.addEventListener('change', () => {
            wasm.theme_set_field('tween_easing', easingSelect.value);
            recompile();
        });

        copyBtn.addEventListener('click', () => {
            const t = readTheme();
            const rust = `Theme {
    name: "${t.name}".into(),
    background: hex("${t.background}"),
    stroke: hex("${t.stroke}"),
    stroke_width: ${t.stroke_width},
    label: hex("${t.label}"),
    accents: vec![
${t.accents.map(c => `        hex("${c}"),`).join('\n')}
    ],
    grain_enabled: ${t.grain_enabled},
    grain_intensity: ${t.grain_intensity},
    spring_stiffness: ${t.spring_stiffness},
    spring_damping: ${t.spring_damping},
    tween_duration: ${t.tween_duration},
    tween_easing: "${t.tween_easing}".into(),
}`;
            navigator.clipboard.writeText(rust).then(() => {
                copyBtn.textContent = 'copied!';
                setTimeout(() => copyBtn.textContent = 'copy as rust preset', 1200);
            });
        });

        renderTheme();

        // Trigger initial compile after wasm is loaded
        if (window.__onCodeChange) {
            window.__onCodeChange(editor.state.doc.toString());
        }

        // Subscribe to server-sent updates — only apply changes for the current scene
        const evtSource = new EventSource('/events');
        evtSource.onmessage = (e) => {
            try {
                const update = JSON.parse(e.data);
                if (update.name !== currentScene) return;
                if (update.content === editor.state.doc.toString()) return;
                replaceEditorContent(update.content);
                console.log('[sse] updated', update.name, update.content.length, 'chars');
            } catch (err) {
                console.warn('[sse] bad payload:', err);
            }
        };
        evtSource.onerror = (e) => {
            console.warn('[sse] connection error', e);
        };
    </script>
</body>
</html>
