[package]
name = "xtask"
version = "0.1.0"
edition = "2024"

[dependencies]
axum = "0.7"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "sync", "signal"] }
tower-http = { version = "0.5", features = ["fs", "set-header"] }
notify = "6"
tokio-stream = { version = "0.1", features = ["sync"] }
futures-util = "0.3"
