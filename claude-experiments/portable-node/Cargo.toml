[package]
name = "portable-node"
version = "0.0.1"
edition = "2021"

[dependencies]
rquickjs = { version = "0.11", features = ["macro", "array-buffer"] }
base64 = "0.22"
libc = "0.2"
hostname = "0.4"
flate2 = "1.0"
mio = { version = "1.0", features = ["os-poll", "net"] }
httparse = "1"
sha2 = "0.10"
sha1 = "0.10"
md-5 = "0.10"
hmac = "0.12"
digest = "0.10"
getrandom = "0.2"
