[package]
name = "flame-bevy"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Embed the flame-graph renderer inside a Bevy app."

[dependencies]
flame-core.workspace = true
flame-render.workspace = true
wgpu.workspace = true
bytemuck.workspace = true
log.workspace = true

# Bevy uses wgpu 27 internally; flame-render is on wgpu 29 (forced by glyphon
# 0.11). We deliberately keep the two stacks isolated and bridge via CPU
# pixel readback into a `bevy::Image`. See `src/lib.rs` for the details.
bevy = { version = "0.18", default-features = false, features = [
    "bevy_asset",
    "bevy_image",
    "bevy_render",
    "bevy_window",
    "bevy_winit",
    "bevy_log",
    "bevy_color",
] }

# pollster only used inside the (very small) async readback path
pollster.workspace = true

[dev-dependencies]
# Examples want a more featureful Bevy
bevy = { version = "0.18", features = ["bevy_ui", "default_font", "x11", "wayland"] }

[[example]]
name = "embed_panel"
path = "examples/embed_panel.rs"

[[example]]
name = "embed_fullscreen"
path = "examples/embed_fullscreen.rs"
