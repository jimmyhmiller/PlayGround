[package]
# Vendored from https://github.com/tokio-rs/mini-redis (MIT) and patched to
# import from cf-tokio instead of tokio. The clients module and CLI binary
# are excluded — server-only build for now.
name = "mini-redis-cf"
version = "0.4.1-cf"
edition = "2021"
license = "MIT"

[lib]
path = "src/lib.rs"

[dependencies]
cf-tokio = { workspace = true }
async-stream = "0.3"
atoi = "2"
bytes = "1"
tracing = "0.1"
