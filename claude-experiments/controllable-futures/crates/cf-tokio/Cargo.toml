[package]
name = "cf-tokio"
version = "0.1.0"
edition.workspace = true

# No-op features matching tokio's feature flags so that vendored crates'
# Cargo.tomls (which write `features = ["full"]` etc) can resolve. We don't
# actually conditionally compile anything yet; everything we ship is always
# available, and missing surface is a compile error at use site.
[features]
default = []
full = []
rt = []
rt-multi-thread = []
macros = []
io-util = []
io-std = []
sync = []
time = []
net = []
fs = []
process = []
signal = []
test-util = []
tracing = []

[dependencies]
cf-runtime = { workspace = true }
cf-tokio-macros = { workspace = true }
async-channel = { workspace = true }
async-lock = { workspace = true }
async-net = { workspace = true }
async-io = { workspace = true }
async-broadcast = { workspace = true }
event-listener = { workspace = true }
futures-lite = { workspace = true }
futures-core = { workspace = true }
parking_lot = { workspace = true }
pin-project-lite = { workspace = true }
bytes = { workspace = true }
once_cell = { workspace = true }
