[package]
name = "memscope-cli"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "Terminal consumer for the memscope agent: live allocation monitor + type-resolved heap dump explorer."

[[bin]]
name = "memscope"
path = "src/main.rs"

[dependencies]
memscope-proto = { path = "../memscope-proto" }
memscope-replay = { path = "../memscope-replay" }
serde = { workspace = true }
serde_json = { workspace = true }
libc = "0.2"
