[package]
name = "memscope-agent"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "In-process transport server: streams memscope events + serves type-resolved heap dumps over a Unix socket."

[dependencies]
memscope-core = { path = "../memscope-core" }
memscope-symbols = { path = "../memscope-symbols" }
memscope-proto = { path = "../memscope-proto" }
memscope-graph = { path = "../memscope-graph" }
memscope-hprof = { path = "../memscope-hprof" }
libc = "0.2"
serde = { workspace = true }
serde_json = { workspace = true }
