[package]
name = "memscope-hprof"
version = "0.1.0"
edition.workspace = true
license.workspace = true
description = "Writes a memscope heap reference graph as a JVM HPROF (1.0.2) binary heap dump, so a Rust program's heap opens in Eclipse MAT / VisualVM (dominator tree, retained sizes, paths-to-roots)."

[dependencies]
memscope-proto = { path = "../memscope-proto" }
memscope-symbols = { path = "../memscope-symbols" }
