[package]
name = "git-guard"
version = "0.1.0"
edition = "2021"
description = "Fast Claude Code PreToolUse hook that gates destructive git operations."
license = "MIT"

[[bin]]
name = "git-guard"
path = "src/main.rs"

[dependencies]
serde_json = "1"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = true
