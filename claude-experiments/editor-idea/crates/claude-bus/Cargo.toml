[package]
name = "claude-bus"
version = "0.1.0"
edition = "2024"
license.workspace = true

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bincode = { version = "2", features = ["serde"] }
libc = "0.2"

[lib]
name = "claude_bus"
path = "src/lib.rs"

[[bin]]
name = "claude-bus"
path = "src/bin/claude-bus.rs"

[[bin]]
name = "claude-bus-tail"
path = "src/bin/claude-bus-tail.rs"
