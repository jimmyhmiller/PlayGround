[package]
name = "claude-bus-bevy"
version = "0.1.0"
edition = "2024"

[dependencies]
claude-bus = { path = "../claude-bus" }
bevy = { version = "0.18", default-features = false, features = ["bevy_log"] }

[lib]
name = "claude_bus_bevy"
path = "src/lib.rs"

[[bin]]
name = "claude-bus-bevy-probe"
path = "src/bin/probe.rs"
