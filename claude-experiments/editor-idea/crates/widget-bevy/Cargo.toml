[package]
name = "widget_bevy"
version = "0.1.0"
edition = "2024"

[dependencies]
pane_bevy = { path = "../pane-bevy" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = "0.8"
clap = { version = "4", features = ["derive"] }
bevy = { version = "0.18", default-features = false, features = [
    "2d",
    "x11",
    "wayland",
] }

[lib]
name = "widget_bevy"
path = "src/lib.rs"

[[bin]]
name = "widget"
path = "src/bin/widget.rs"
