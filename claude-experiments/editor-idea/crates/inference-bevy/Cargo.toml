[package]
name = "inference_bevy"
version = "0.1.0"
edition = "2024"

[dependencies]
claude-bus = { path = "../claude-bus" }
claude-bus-bevy = { path = "../claude-bus-bevy" }
bevy = { version = "0.18", default-features = false, features = ["bevy_log"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Blocking HTTP. Small dep tree; we call from a dedicated thread so
# blocking-in-place is fine. rustls-tls for TLS without OpenSSL.
ureq = { version = "2", default-features = false, features = ["tls", "json"] }

[lib]
name = "inference_bevy"
path = "src/lib.rs"

# Smoke-test binary for the LLM call alone (no Bevy). Reads
# LLM_API_KEY (or DEEPSEEK_KEY) and prints the classifier output for
# one (project_name, cwd) pair from argv. Useful for verifying the
# endpoint + key without restarting the editor.
[[bin]]
name = "infer-classify-cwd"
path = "src/bin/classify_cwd.rs"
