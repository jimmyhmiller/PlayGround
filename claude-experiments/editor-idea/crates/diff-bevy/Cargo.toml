[package]
name = "diff_bevy"
version = "0.1.0"
edition = "2024"
license.workspace = true

[dependencies]
diff_core = { path = "../diff-core" }
pane_bevy = { path = "../pane-bevy" }
style_bevy = { path = "../style-bevy" }
# Reused for tree-sitter Rust syntax highlighting (Highlighter,
# HighlightKind, SyntaxPalette) so diff lines colorize exactly like the
# editor pane.
editor_bevy = { path = "../editor-bevy" }
ropey = "1.6.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bevy = { version = "0.18", default-features = false, features = [
    "2d",
    "x11",
    "wayland",
] }

[lib]
name = "diff_bevy"
path = "src/lib.rs"
