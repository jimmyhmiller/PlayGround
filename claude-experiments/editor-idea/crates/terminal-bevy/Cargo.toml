[package]
name = "terminal_bevy"
version = "0.1.0"
edition = "2024"

[dependencies]
arboard = "3.4"
bytemuck = { version = "1", features = ["derive"] }
editor_bevy = { path = "../editor-bevy" }
editor_core = { path = "../editor-core" }
pane_bevy = { path = "../pane-bevy" }
terminal_daemon = { path = "../terminal-daemon" }
widget_bevy = { path = "../widget-bevy" }
claude-bus-bevy = { path = "../claude-bus-bevy" }
libghostty-vt = "0.1.1"
# Native file dialog for Cmd+O. Synchronous on macOS — opens the
# system NSOpenPanel on the calling (main) thread.
rfd = "0.15"
nix = { version = "0.31", features = ["term", "fs", "signal", "process", "user", "ioctl", "poll"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bincode = { version = "2", features = ["serde"] }
libc = "0.2"
skrifa = "0.39"
# Glyph rasterization for our own atlas — bypasses cosmic-text/Text2d
# entirely. Already a transitive dep via Bevy's cosmic-text, declared
# here so we can import it directly.
swash = "0.2"
bevy = { version = "0.18", default-features = false, features = [
    "2d",
    "x11",
    "wayland",
] }

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.5"
objc2-app-kit = { version = "0.2", features = ["NSDockTile", "NSWorkspace", "NSRunningApplication", "NSEvent", "libc"] }
objc2-foundation = "0.2"
# CoreText for system-cascade glyph fallback — instead of a hardcoded
# list of font paths, ask the OS "which font has this codepoint?" and
# load its bytes. Same model real terminals (Terminal.app, Alacritty,
# kitty) use, just less surprising as the user installs/removes fonts.
core-text = "21"
core-foundation = "0.10"

[lib]
name = "terminal_bevy"
path = "src/lib.rs"

[[bin]]
name = "terminal"
path = "src/main.rs"

[[bin]]
name = "tbopen"
path = "src/bin/tbopen.rs"

[[bin]]
name = "tbwidget"
path = "src/bin/tbwidget.rs"

[dev-dependencies]
tempfile = "3"
