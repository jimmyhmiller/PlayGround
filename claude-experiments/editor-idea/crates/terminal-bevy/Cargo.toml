[package]
name = "terminal_bevy"
version = "0.1.0"
edition = "2024"

[dependencies]
arboard = "3.4"
bytemuck = { version = "1", features = ["derive"] }
editor_bevy = { path = "../editor-bevy" }
editor_core = { path = "../editor-core" }
pane_bevy = { path = "../pane-bevy" }
style_bevy = { path = "../style-bevy" }
terminal_daemon = { path = "../terminal-daemon" }
widget_bevy = { path = "../widget-bevy" }
claude-bus-bevy = { path = "../claude-bus-bevy" }
claude-bus = { path = "../claude-bus" }
inference_bevy = { path = "../inference-bevy" }
libghostty-vt = "0.1.1"
# Native file dialog for Cmd+O. Synchronous on macOS — opens the
# system NSOpenPanel on the calling (main) thread.
rfd = "0.15"
nix = { version = "0.31", features = ["term", "fs", "signal", "process", "user", "ioctl", "poll"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Hot-reloadable runtime tuning for the project-prism (cube.rs):
# ~/.terminal-bevy/cube.rhai is evaluated to a params map.
rhai = { version = "1.21", features = ["sync"] }
bincode = { version = "2", features = ["serde"] }
libc = "0.2"
# File-watching for garden sprite hot reload — picks up edits to text
# files under ~/.terminal-bevy/garden-art/ and rebuilds the relevant
# Image assets without restarting the app.
notify = { version = "8", default-features = false, features = ["macos_fsevent"] }
# PNG decoding for the embedded garden sprite sheet (CC0 OpenGameArt
# "Flowers" plant pack, 78 12x24 plants on a 936x24 strip).
image = { version = "0.25", default-features = false, features = ["png"] }
skrifa = "0.39"
# Glyph rasterization for our own atlas — bypasses cosmic-text/Text2d
# entirely. Already a transitive dep via Bevy's cosmic-text, declared
# here so we can import it directly.
swash = "0.2"
bevy = { version = "0.18", default-features = false, features = [
    "2d",
    # Real perspective 3D (Camera3d + PBR meshes + StandardMaterial),
    # used by the project-prism "cube" mode (src/cube.rs) to texture each
    # project's live render target onto a face of a rotating N-gon prism.
    "3d",
    "x11",
    "wayland",
    # Hot-reload shaders / textures / any asset when their source file
    # changes on disk. Without this, AssetServer ignores file changes
    # and the live-edit workflow doesn't work.
    "file_watcher",
] }

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.5"
objc2-app-kit = { version = "0.2", features = ["NSDockTile", "NSWorkspace", "NSRunningApplication", "NSEvent", "libc"] }
objc2-foundation = "0.2"
# Obj-C block support, for the AVCaptureDevice mic-access completion
# handler (see request_microphone_access). 0.5 matches objc2 0.5.
block2 = "0.5"
# CoreText for system-cascade glyph fallback — instead of a hardcoded
# list of font paths, ask the OS "which font has this codepoint?" and
# load its bytes. Same model real terminals (Terminal.app, Alacritty,
# kitty) use, just less surprising as the user installs/removes fonts.
core-text = "21"
core-foundation = "0.10"

[lib]
name = "terminal_bevy"
path = "src/lib.rs"

[[bin]]
name = "terminal"
path = "src/main.rs"

[[bin]]
name = "tbopen"
path = "src/bin/tbopen.rs"

[[bin]]
name = "tbwidget"
path = "src/bin/tbwidget.rs"

[[bin]]
name = "tbinbox"
path = "src/bin/tbinbox.rs"

[[bin]]
name = "tbproject"
path = "src/bin/tbproject.rs"

[[bin]]
name = "tbsuggest"
path = "src/bin/tbsuggest.rs"

[[bin]]
name = "tbmsg"
path = "src/bin/tbmsg.rs"

[[bin]]
name = "tbclose"
path = "src/bin/tbclose.rs"

[dev-dependencies]
tempfile = "3"
