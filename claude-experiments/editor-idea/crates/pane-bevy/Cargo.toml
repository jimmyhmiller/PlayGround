[package]
name = "pane_bevy"
version = "0.1.0"
edition = "2024"

[dependencies]
editor_core = { path = "../editor-core" }
ropey = "1.6.1"
arboard = "3.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
skrifa = "0.39"
bevy = { version = "0.18", default-features = false, features = [
    "2d",
    "x11",
    "wayland",
] }

[lib]
name = "pane_bevy"
path = "src/lib.rs"
