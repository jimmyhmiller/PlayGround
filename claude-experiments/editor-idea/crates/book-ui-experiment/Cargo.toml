[package]
name = "book_ui_experiment"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = { version = "0.18", features = ["x11", "wayland", "jpeg"] }
bevy_egui = "0.39"
lyon = "1.0"
ttf-parser = "0.25"
geo = "0.33"
image = { version = "0.25", default-features = false, features = ["jpeg"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[[bin]]
name = "book_ui"
path = "src/main.rs"

[[bin]]
name = "carved_demo"
path = "src/carved_demo.rs"

[[bin]]
name = "letters_demo"
path = "src/letters_demo.rs"
