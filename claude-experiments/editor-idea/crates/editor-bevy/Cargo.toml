[package]
name = "editor_bevy"
version = "0.1.0"
edition = "2024"

[dependencies]
editor_core = { path = "../editor-core" }
pane_bevy = { path = "../pane-bevy" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ropey = "1.6.1"
arboard = "3.4"
tree-sitter = "0.26"
tree-sitter-rust = "0.24"
# Pinned to the same major as cosmic-text 0.16 (Bevy 0.18's text
# backend) so we read metrics with the same font parser. Used only to
# measure the monospace cell advance once at startup.
skrifa = "0.39"
# `2d` covers Text2d via bevy_sprite + the sprite renderer + bevy_text.
# We deliberately skip the `ui` feature (Node/bevy_ui): the editor renders
# its own caret/selection as sprite quads so layout is driven by cosmic-text
# glyph positions, not Bevy UI.
bevy = { version = "0.18", default-features = false, features = [
    "2d",
    "x11",
    "wayland",
] }

# macOS-only: used to call `NSApplication::deactivate()` right after
# window creation so launching the app doesn't yank keyboard focus from
# whatever the user was doing. Without this Bevy's winit backend always
# calls `activateIgnoringOtherApps(true)` on startup.
[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.5"
objc2-app-kit = "0.2"
objc2-foundation = "0.2"

[lib]
name = "editor_bevy"
path = "src/lib.rs"

[[bin]]
name = "editor"
path = "src/main.rs"

[[bin]]
name = "screenshots"
path = "src/bin/screenshots.rs"
