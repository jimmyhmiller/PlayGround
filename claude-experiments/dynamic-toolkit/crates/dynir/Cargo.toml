[package]
name = "dynir"
version = "0.1.0"
edition = "2021"

[dependencies]
dynexec = { path = "../dynexec" }
dynsym = { path = "../dynsym" }
dynvalue = { path = "../dynvalue" }
dynobj = { path = "../dynobj" }
dynalloc = { path = "../dynalloc" }

[dev-dependencies]
proptest = "1"
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "build"
harness = false
