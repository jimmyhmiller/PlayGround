<!doctype html>
<html lang="en" data-theme="dark" data-density="comfortable">
<head>
  <meta charset="utf-8" />
  <title>~/showcase — selected work</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..600&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="projects-data.js"></script>
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="project-section.jsx"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    function App() {
      const [editMode, setEditMode] = React.useState(false);
      const [toast, setToast] = React.useState(null);
      const originalsRef = React.useRef(null);

      const visibleProjects = window.PROJECTS;

      // Snapshot the original prose strings on first paint so we can diff later.
      React.useEffect(() => {
        const id = requestAnimationFrame(() => {
          const map = {};
          document.querySelectorAll("[data-edit-key]").forEach((el) => {
            map[el.dataset.editKey] = el.textContent.trim();
          });
          originalsRef.current = map;
        });
        return () => cancelAnimationFrame(id);
      }, []);

      // Toggle contentEditable imperatively when edit mode flips. Doing this
      // outside React's render avoids React clobbering edits on re-render.
      React.useEffect(() => {
        document.querySelectorAll("[data-edit-key]").forEach((el) => {
          if (editMode) el.setAttribute("contenteditable", "plaintext-only");
          else el.removeAttribute("contenteditable");
        });
        document.documentElement.classList.toggle("edit-mode", editMode);
      }, [editMode]);

      const exportEdits = React.useCallback(() => {
        const orig = originalsRef.current || {};
        const changes = {};
        document.querySelectorAll("[data-edit-key]").forEach((el) => {
          const key = el.dataset.editKey;
          const cur = el.textContent.trim().replace(/\s+/g, " ");
          if (cur !== (orig[key] || "").replace(/\s+/g, " ")) changes[key] = cur;
        });
        const n = Object.keys(changes).length;
        if (n === 0) {
          setToast("No changes to copy");
          setTimeout(() => setToast(null), 1500);
          return;
        }
        const json = JSON.stringify(changes, null, 2);
        navigator.clipboard.writeText(json).then(
          () => {
            setToast(`Copied ${n} edit${n === 1 ? "" : "s"} to clipboard`);
            setTimeout(() => setToast(null), 2000);
          },
          () => {
            console.log("[showcase edits]\n" + json);
            setToast("Clipboard blocked — see console");
            setTimeout(() => setToast(null), 2500);
          }
        );
      }, []);

      React.useEffect(() => {
        const onKey = (e) => {
          const mod = e.metaKey || e.ctrlKey;
          if (mod && !e.shiftKey && e.key.toLowerCase() === "e") {
            e.preventDefault();
            setEditMode((v) => !v);
          } else if (mod && e.shiftKey && e.key.toLowerCase() === "x") {
            e.preventDefault();
            exportEdits();
          }
        };
        window.addEventListener("keydown", onKey);
        window.__copyEdits = exportEdits;
        window.__toggleEdits = () => setEditMode((v) => !v);
        return () => window.removeEventListener("keydown", onKey);
      }, [exportEdits]);

      // Print-to-PDF: pin layout width to 1280px (= 13.333in) so headless
      // Chrome's print pass renders at the same width we view at. The @page
      // size is a generous fixed height set in styles.css; print.sh runs
      // pdfcrop afterward to trim trailing whitespace.
      React.useEffect(() => {
        const isPrint = /[?&]print=1/.test(window.location.search);
        if (!isPrint) return;
        document.documentElement.style.width = "1280px";
        document.body.style.width = "1280px";
        document.body.style.margin = "0 auto";
        document.documentElement.style.setProperty("--section-pad-y", "90px");
        document.documentElement.style.setProperty("--gutter", "60px");
        const printMirror = document.createElement("style");
        printMirror.textContent =
          ".hero { padding: 110px 60px 80px !important; } " +
          ".project { padding: 90px 60px !important; } " +
          ".imgblock video { display: none !important; } " +
          ".imgblock .video-poster { display: block !important; width: 100%; height: auto; border-radius: 6px; } " +
          ".edit-hint, .edit-toast { display: none !important; }";
        document.head.appendChild(printMirror);
      }, []);

      return (
        <>
          <header className="topbar">
            <div className="topbar-left">
              <span className="topbar-mark">Jimmy Miller</span>
            </div>
            <nav className="topbar-right">
              <a href="https://jimmyhmiller.com" target="_blank" rel="noreferrer">Website</a>
              <a href="https://github.com/jimmyhmiller" target="_blank" rel="noreferrer">GitHub</a>
              <a href="mailto:jimmyhmiller@gmail.com">Contact</a>
            </nav>
          </header>

          <main>
            <section className="hero" data-screen-label="00 Hero">
              <h1 className="hero-title">
                Things I've been<br />
                <span className="accent">building</span>, lately
              </h1>
              <p className="hero-bio" data-edit-key="hero.bio">
                I've been having a lot of fun exploring projects lately. Below are just a handful of projects I've been messing with. Some are utilities. Some are learning projects. All of them have been incredibly fun and helped along with AI to various degrees.
              </p>
            </section>

            {visibleProjects.map((p, i) => (
              <ProjectSection
                key={p.id}
                project={p}
                index={i}
                total={visibleProjects.length}
                density="comfortable"
              />
            ))}
          </main>

          {editMode && (
            <div className="edit-hint">
              Edit mode — click any paragraph to edit · ⌘E to exit · ⌘⇧X to copy edits
            </div>
          )}
          {toast && <div className="edit-toast">{toast}</div>}
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
