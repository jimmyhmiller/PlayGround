<!doctype html>
<html lang="en" data-theme="dark" data-density="comfortable">
<head>
  <meta charset="utf-8" />
  <title>~/showcase — selected work</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..600&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="projects-data.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="project-section.jsx"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "dark",
      "density": "comfortable",
      "useProjectColors": true
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      React.useEffect(() => {
        document.documentElement.setAttribute("data-theme", t.theme);
        document.documentElement.setAttribute("data-density", t.density);
      }, [t.theme, t.density]);

      const projects = window.PROJECTS;

      // When useProjectColors is off, strip per-project bg/fg/accent so every
      // section inherits the global theme instead.
      const visibleProjects = React.useMemo(() => {
        if (t.useProjectColors) return projects;
        return projects.map((p) => ({
          ...p,
          bg: undefined,
          fg: undefined,
        }));
      }, [projects, t.useProjectColors]);

      return (
        <>
          <header className="topbar">
            <div className="topbar-left"></div>
            <nav className="topbar-right">
              <a href="https://jimmyhmiller.com" target="_blank" rel="noreferrer">Website</a>
              <a href="https://github.com/jimmyhmiller" target="_blank" rel="noreferrer">GitHub</a>
              <a href="mailto:jimmyhmiller@gmail.com">Contact</a>
            </nav>
          </header>

          <main>
            <section className="hero" data-screen-label="00 Hero">
              <h1 className="hero-title">
                Things I've been<br />
                <span className="accent">building</span>, lately
              </h1>
              <p className="hero-bio">
                A working notebook of recent projects — a mix of tools, libraries,
                prototypes, and the occasional finished product. Some of it shipped.
                Some of it still figuring itself out.
              </p>
            </section>

            {visibleProjects.map((p, i) => (
              <ProjectSection
                key={p.id}
                project={p}
                index={i}
                total={visibleProjects.length}
                density={t.density}
              />
            ))}
          </main>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
