<!doctype html>
<html lang="en" data-theme="dark" data-density="comfortable">
<head>
  <meta charset="utf-8" />
  <title>~/showcase — selected work</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..600&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="projects-data.js"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="project-section.jsx"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "dark",
      "density": "comfortable",
      "useProjectColors": true
    }/*EDITMODE-END*/;

    function App() {
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

      React.useEffect(() => {
        document.documentElement.setAttribute("data-theme", t.theme);
        document.documentElement.setAttribute("data-density", t.density);
      }, [t.theme, t.density]);

      const projects = window.PROJECTS;

      // When useProjectColors is off, strip per-project bg/fg/accent so every
      // section inherits the global theme instead.
      const visibleProjects = React.useMemo(() => {
        if (t.useProjectColors) return projects;
        return projects.map((p) => ({
          ...p,
          bg: undefined,
          fg: undefined,
        }));
      }, [projects, t.useProjectColors]);

      return (
        <>
          <header className="topbar">
            <div className="topbar-left">
              <span className="topbar-mark">~/showcase</span>
            </div>
            <nav className="topbar-right">
              <span className="pill">v1.0</span>
              <a href="https://github.com" target="_blank" rel="noreferrer">github</a>
              <a href="mailto:hello@example.com">contact</a>
            </nav>
          </header>

          <main>
            <section className="hero" data-screen-label="00 Hero">
              <div className="hero-eyebrow">
                <span><b>selected_work</b></span>
                <span className="sep">|</span>
                <span>2024..2026</span>
                <span className="sep">|</span>
                <span>{visibleProjects.length} projects</span>
                <span className="sep">|</span>
                <span>last updated apr 2026</span>
              </div>
              <h1 className="hero-title">
                things i've been<br />
                <span className="accent">building</span>, lately<span className="cursor"></span>
              </h1>
              <p className="hero-bio">
                a working notebook of recent projects — a mix of tools, libraries,
                prototypes, and the occasional finished product. some of it shipped.
                some of it still figuring itself out. read top-to-bottom or jump from
                the index below.
              </p>
              <div className="hero-foot">
                <span>↓ scroll, or pick from the index</span>
                <span><b>$</b> updated apr 2026</span>
              </div>
            </section>

            {visibleProjects.map((p, i) => (
              <ProjectSection
                key={p.id}
                project={p}
                index={i}
                total={visibleProjects.length}
                density={t.density}
              />
            ))}
          </main>

          <footer className="footer" data-screen-label="99 Footer">
            <div className="footer-mark">end of file</div>
            <div className="footer-meta">
              <b>built &amp; maintained solo</b>
              2026 · v1.0 · {visibleProjects.length} entries
            </div>
          </footer>

          <TweaksPanel title="Tweaks">
            <TweakSection label="Theme" />
            <TweakRadio
              label="Mode"
              value={t.theme}
              options={["light", "dark"]}
              onChange={(v) => setTweak("theme", v)}
            />
            <TweakRadio
              label="Density"
              value={t.density}
              options={["compact", "comfortable", "spacious"]}
              onChange={(v) => setTweak("density", v)}
            />
            <TweakSection label="Sections" />
            <TweakToggle
              label="Per-project colors"
              value={t.useProjectColors}
              onChange={(v) => setTweak("useProjectColors", v)}
            />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
