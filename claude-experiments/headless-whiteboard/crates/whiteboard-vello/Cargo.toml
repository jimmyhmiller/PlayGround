[package]
name = "whiteboard-vello"
description = "GPU backend scaffold for whiteboard-core: converts the draw-command list into Vello scene fragments. Feature-gated; full GPU path lands in a later phase."
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[dependencies]
whiteboard-core = { path = "../whiteboard-core" }
# Scene assembly only: `default-features = false` drops the wgpu / vello_shaders
# GPU stack, leaving the retained-mode `vello::Scene` builder (plus its peniko /
# kurbo re-exports) which is pure CPU-side and testable headlessly. The wgpu
# surface wiring lives behind vello's `default` feature for the eventual GPU phase.
vello = { version = "0.9", default-features = false }
