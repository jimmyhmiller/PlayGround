[package]
name = "whiteboard-web"
description = "Web (HTML5 Canvas 2D) backend for whiteboard-core: walks the backend-agnostic draw-command list and paints it onto a CanvasRenderingContext2d via wasm-bindgen/web-sys. The command->canvas-op translation is a pure, host-testable function so the crate builds and tests on the host target as well as wasm32."
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[lib]
# rlib lets the host target and other Rust code link the pure logic; cdylib is
# the wasm artifact a JS host loads.
crate-type = ["cdylib", "rlib"]

[dependencies]
whiteboard-core = { path = "../whiteboard-core" }
serde_json = { workspace = true }

# The wasm-only glue. These compile on the host too (they are just regular
# crates), but the web-sys *types* are only constructable inside a browser, so
# all calls into them are gated on target_arch = "wasm32".
wasm-bindgen = "0.2"
js-sys = "0.3"

[dependencies.web-sys]
version = "0.3"
features = [
    "Window",
    "Document",
    "HtmlCanvasElement",
    "HtmlImageElement",
    "CanvasRenderingContext2d",
    "CanvasWindingRule",
    "Path2d",
    "TextMetrics",
]
