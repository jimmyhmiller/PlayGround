[workspace]
resolver = "2"
members = [
    "crates/whiteboard-core",
    "crates/whiteboard-tiny-skia",
    "crates/whiteboard-vello",
    "examples/winit-draw",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT"
authors = ["Jimmy Miller"]
repository = "https://github.com/jimmyhmiller/headless-whiteboard"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
insta = "1"
