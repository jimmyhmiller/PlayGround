[package]
name = "flow-bevy"
version = "0.1.0"
edition = "2024"
default-run = "flow-bevy"

[dependencies]
arc-swap = "1"
# Trimmed Bevy: this is a pure-2D app (Mesh2d / ColorMaterial / Sprite /
# Text2d / bevy_ui), so we disable the default meta-features ("2d" + "3d" +
# "ui", which drag in PBR, glTF, lighting, raytracing, audio, scene, gamepad,
# x11/wayland/webgl, ...) and enumerate only the leaf features we use. This
# removes dozens of dependency crates and a large fraction of build artifacts.
bevy = { version = "0.18", default-features = false, features = [
    # platform / runtime
    "std",
    "multi_threaded",
    "bevy_winit",
    "bevy_window",
    "bevy_log",
    "bevy_asset",
    "sysinfo_plugin",        # backs the perf/diagnostics overlay
    # 2D rendering (pulls common_api: camera, color, mesh, text, gizmos,
    # image+png, animation; plus render, core_pipeline, sprite_render,
    # post_process, gizmos_render)
    "2d_bevy_render",
    # UI rendering (pulls ui_api: bevy_ui; plus ui_render)
    "ui_bevy_render",
    # fonts
    "default_font",
    # picking — needed for the UI `Interaction` component
    "bevy_picking",
    "ui_picking",
    # explicitly wanted dev tooling
    "bevy_dev_tools",
] }
bevy_image_font = "0.11"
flow = { path = "../flow" }
poster-ui = { path = "../poster-ui" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Glyph rasterization for the in-tree `glyph_atlas` module. Already a
# transitive dep via `bevy_text` / `cosmic-text`; declared explicitly
# so we can call it directly from the atlas + the text-rendering
# bench. Vendored from editor-idea's terminal atlas.
swash = "0.2"

[target.'cfg(target_os = "macos")'.dependencies]
# CoreText for the system glyph cascade — when the primary font is
# missing a codepoint (geometric / box-drawing / pictograph chars
# common in node glyphs), ask the OS which font owns it and load
# those bytes. Real terminals (Terminal.app, kitty) use the same
# pattern. Vendored alongside `glyph_atlas`.
core-text = "21"
core-foundation = "0.10"

[dev-dependencies]
poster-ui = { path = "../poster-ui", features = ["testing"] }
proptest = "1"

# Build with `--features trace` to enable Bevy's tracing spans + a
# Chrome-trace JSON dump (loadable in https://ui.perfetto.dev). Off
# by default because tracing adds per-system overhead we don't want
# to pay in normal release runs.
#
# `bevy/debug` is required so the trace spans carry real system /
# entity names; without it everything reads
# "<Enable the debug feature to see the name>".
[features]
default = []
trace = ["bevy/trace", "bevy/trace_chrome", "bevy/debug"]
