[package]
name = "flow-bevy"
version = "0.1.0"
edition = "2024"
default-run = "flow-bevy"

[dependencies]
bevy = { version = "0.18", features = ["default_font"] }
flow = { path = "../flow" }
poster-ui = { path = "../poster-ui" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
poster-ui = { path = "../poster-ui", features = ["testing"] }
proptest = "1"
