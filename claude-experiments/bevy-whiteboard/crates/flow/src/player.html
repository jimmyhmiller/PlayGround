<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>__TITLE__ — flow player</title>
<style>
  :root {
    --bg: #0f1116;
    --panel: #171a21;
    --fg: #e8e8ea;
    --dim: #8a8d96;
    --accent: #6fb3ff;
    --edge: #3a3f49;
    --node-stroke: #c8ccd4;
    --pkt: #ffb84d;
    --fire: #a6e07f;
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 13px/1.4 -apple-system, BlinkMacSystemFont, "SF Mono", Menlo, monospace;
  }
  header {
    padding: 10px 14px;
    background: var(--panel);
    border-bottom: 1px solid #2a2f38;
    display: flex; align-items: center; gap: 14px;
  }
  header h1 { font-size: 14px; margin: 0; font-weight: 600; }
  header .t { color: var(--dim); }
  #scrubber { flex: 1; }
  button {
    background: #222733; color: var(--fg); border: 1px solid #333;
    padding: 4px 10px; border-radius: 4px; cursor: pointer;
    font: inherit;
  }
  button:hover { background: #2b3240; }
  main {
    display: grid;
    grid-template-columns: 1fr 320px;
    height: calc(100vh - 45px);
  }
  #stage {
    background: radial-gradient(ellipse at center, #181b22 0%, #0f1116 70%);
    overflow: hidden;
  }
  #side {
    background: var(--panel);
    border-left: 1px solid #2a2f38;
    overflow-y: auto;
    padding: 12px 14px;
  }
  #side h2 {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--dim); margin: 12px 0 6px 0;
  }
  .node-panel { margin-bottom: 14px; border: 1px solid #242832; border-radius: 6px; padding: 8px 10px; }
  .node-panel .name { font-weight: 600; }
  .slot { display: flex; justify-content: space-between; color: var(--dim); font-size: 12px; }
  .slot .v { color: var(--fg); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .metric { color: var(--fire); font-size: 12px; }
  .evt { color: var(--dim); font-size: 11px; padding: 2px 0; font-family: "SF Mono", Menlo, monospace; }
  .evt .et { color: #5a6070; margin-right: 4px; }
  .evt.hi { color: var(--fg); background: #2a3a4a; padding: 2px 4px; border-radius: 3px; }
  .evt.hi .et { color: var(--accent); }
  text { font: 11px -apple-system, BlinkMacSystemFont, sans-serif; fill: var(--fg); user-select: none; pointer-events: none; }
  .node-circle { fill: #1f242e; stroke: var(--node-stroke); stroke-width: 1.5; }
  .node-circle.firing { fill: #2a5d2a; stroke: var(--fire); stroke-width: 2.5; }
  .edge-line { stroke: var(--edge); stroke-width: 1.2; fill: none; }
  .edge-line.active { stroke: var(--accent); }
  .packet { fill: var(--pkt); }
  .spawn-flash { fill: #2c3b2c; stroke: var(--fire); stroke-width: 2; }
  .queue-label { fill: var(--accent); font-weight: 600; }
  .pkt-label { fill: #fff; font-size: 10px; font-weight: 600; }
  .chip-label { fill: #fff; font-size: 10px; }
</style>
</head>
<body>
<header>
  <h1>__TITLE__</h1>
  <span class="t" id="t-display">t = 0.00 ms</span>
  <button id="step-back" title="Step back (←)">◀</button>
  <button id="play">▶</button>
  <button id="step-fwd" title="Step forward (→)">▶|</button>
  <button id="speed">1×</button>
  <input type="range" id="scrubber" min="0" max="1000" value="0"/>
  <span class="t" id="end-display"></span>
  <span class="t" id="evt-display"></span>
</header>
<main>
  <svg id="stage" viewBox="-400 -300 800 600" preserveAspectRatio="xMidYMid meet"></svg>
  <aside id="side"></aside>
</main>
<script>
const DATA = __DATA__;
const SVG_NS = "http://www.w3.org/2000/svg";

// ---------- state ----------
let t_ns = 0;
let event_idx = -1;            // -1 = before any event
let playing = false;
// Speed cycle: each click of the × button cycles through. Includes very
// slow values so the user can actually see what's happening between events.
const SPEEDS = [1, 0.5, 0.25, 0.1, 0.05, 0.02, 0.01, 2, 4];
let speed_idx = 0;
let speed = SPEEDS[speed_idx];
let highlight_event_idx = -1;
// Sim time we simulate per real-time second at 1x. 20ms real = 100ms sim → 5x slower for visibility.
const NS_PER_REAL_SEC = 200_000_000;

// ---------- event log index ----------
const events = DATA.events;
const nodes = new Map(DATA.nodes.map(n => [n.id, n]));
const edges = new Map(DATA.edges.map(e => [e.id, e]));

// Build per-node slot history for efficient lookup.
// slot_writes[node][slot] = array of {at, value}
const slot_writes = new Map();
// metrics[node] = array of {at, name, value}
const metrics = new Map();
// packet travel: packet_id → {emitted_at, arrives_at, from, to, payload, delivered_at?, consumed_at?}
const packets = new Map();
// node spawn/despawn timeline: node_id → {spawn_at, despawn_at?, template, parent}
const node_life = new Map();

// Extract the "tag" summary from a payload value (for labeling).
function payload_tag(v) {
  if (v && typeof v === "object" && "tag" in v) return v.tag;
  if (v === null) return "nil";
  if (typeof v === "string") return '"' + v + '"';
  if (typeof v === "number" || typeof v === "boolean") return String(v);
  return "…";
}

// Hash tag → HSL hue so variants get stable distinct colors.
function tag_color(tag) {
  let h = 0;
  for (let i = 0; i < tag.length; i++) h = (h * 31 + tag.charCodeAt(i)) | 0;
  const hue = ((h % 360) + 360) % 360;
  return `hsl(${hue}, 70%, 60%)`;
}
// Initial nodes are "alive from t=0".
for (const n of nodes.values()) {
  node_life.set(n.id, { spawn_at: 0, template: null, parent: null });
}

// Index each event with its position so downstream lookups can reason
// about "state after event #N" rather than "state at time t".
events.forEach((ev, i) => { ev._i = i; });

for (const ev of events) {
  const i = ev._i;
  if (ev.k === "slot") {
    if (!slot_writes.has(ev.node)) slot_writes.set(ev.node, new Map());
    const m = slot_writes.get(ev.node);
    if (!m.has(ev.slot)) m.set(ev.slot, []);
    m.get(ev.slot).push({ at: ev.at, idx: i, value: ev.value });
  } else if (ev.k === "metric") {
    if (!metrics.has(ev.node)) metrics.set(ev.node, []);
    metrics.get(ev.node).push({ at: ev.at, idx: i, name: ev.name, value: ev.value });
  } else if (ev.k === "emit") {
    packets.set(ev.packet, {
      emitted_at: ev.at, arrives_at: ev.arrives,
      from: ev.from, to: ev.to,
      payload: ev.payload,
      tag: payload_tag(ev.payload),
      emit_idx: i,
    });
  } else if (ev.k === "deliver") {
    const p = packets.get(ev.packet);
    if (p) { p.delivered_at = ev.at; p.deliver_idx = i; }
  } else if (ev.k === "consume") {
    const p = packets.get(ev.packet);
    if (p) { p.consumed_at = ev.at; p.consume_idx = i; }
  } else if (ev.k === "spawn") {
    node_life.set(ev.node, { spawn_at: ev.at, template: ev.template, parent: ev.parent });
    // We need the node's name and position; the sim JSON only lists
    // initial nodes. For spawned-later nodes, we need to invent a position.
    // Simple: append to a new layer below the original circle.
    if (!nodes.has(ev.node)) {
      const existing = [...nodes.values()];
      const i = existing.length;
      const angle = i * 0.6;
      nodes.set(ev.node, {
        id: ev.node,
        name: (ev.template || "N") + "_" + ev.node,
        x: 350 * Math.cos(angle),
        y: 350 * Math.sin(angle),
        is_spawned: true,
      });
    }
  } else if (ev.k === "despawn") {
    const life = node_life.get(ev.node);
    if (life) life.despawn_at = ev.at;
  }
}

// ---------- scrubber setup ----------
const duration = Math.max(1, DATA.duration_ns);
const scrubber = document.getElementById("scrubber");
scrubber.max = duration;
document.getElementById("end-display").textContent = "T = " + (duration / 1_000_000).toFixed(1) + " ms";

scrubber.addEventListener("input", (e) => {
  t_ns = +e.target.value;
  // Sync event_idx to the latest event with at_ns <= t_ns.
  event_idx = latest_event_before(t_ns);
  highlight_event_idx = -1;  // no individual event flash when scrubbing by time
  render();
});

function latest_event_before(t) {
  // binary search: largest i with events[i].at <= t
  let lo = 0, hi = events.length;
  while (lo < hi) {
    const mid = (lo + hi) >> 1;
    if (events[mid].at <= t) lo = mid + 1;
    else hi = mid;
  }
  return lo - 1;  // -1 if none
}

// Animate t_ns from its current value to `to_t_ns`. On completion,
// set event_idx = target_idx and highlight it.
//
// We always animate (no snap), even for same-instant events — the user
// asked for visible stepping. Same-instant steps hold the current
// visual for a brief beat so they can read it before moving on.
//
// Duration responds to speed: slow speeds give proportionally longer
// animations. Slowest useful is 0.01× where a single step takes
// roughly 30 seconds — plenty of time to watch packets crawl.
let animating = false;
// During animation, state reconstruction respects this upper bound on
// the cursor — events beyond this shouldn't appear "applied" even if
// their at_ns <= t_ns (same-instant clusters).
let anim_target_idx = -1;
function animate_step_to(to_t_ns, target_idx) {
  anim_target_idx = target_idx;
  const gap_ns = Math.max(0, to_t_ns - t_ns);
  let duration;
  if (gap_ns === 0) {
    // Same-instant event: nothing to animate, just a brief beat so the
    // user can read the event line. Fixed real time, unaffected by speed —
    // otherwise 0.01× would make every slot/fire/consume step take 25s of
    // frozen screen.
    duration = 300;
  } else {
    // Time-advancing step: base scales modestly with gap, then by 1/speed
    // so 0.01× is actually slow.
    const base = Math.max(300, Math.min(800, gap_ns / 1_000_000 * 30));
    duration = Math.max(80, Math.min(60_000, base / speed));
  }
  animating = true;
  highlight_event_idx = -1;
  const from_t = t_ns;
  const start = performance.now();
  function frame(now) {
    const p = Math.min(1, (now - start) / duration);
    // Ease-out cubic for less jarring stops.
    const e = 1 - Math.pow(1 - p, 3);
    t_ns = from_t + (to_t_ns - from_t) * e;
    scrubber.value = t_ns;
    render();
    if (p < 1) {
      requestAnimationFrame(frame);
    } else {
      animating = false;
      anim_target_idx = -1;
      event_idx = target_idx;
      highlight_event_idx = target_idx;
      t_ns = to_t_ns;
      scrubber.value = t_ns;
      render();
    }
  }
  requestAnimationFrame(frame);
}

// Time-step: skip past same-instant events to the next time advance.
// This is what usually makes packets visibly travel — travel requires
// a time gap, so "next time advance" is the meaningful unit of motion.
function step_forward_time() {
  if (animating) return;
  playing = false; document.getElementById("play").textContent = "▶";
  if (event_idx + 1 >= events.length) return;
  let target = event_idx + 1;
  // Walk forward through events at the same instant.
  while (target + 1 < events.length && events[target].at <= t_ns) target++;
  animate_step_to(events[target].at, target);
}
function step_backward_time() {
  if (animating) return;
  playing = false; document.getElementById("play").textContent = "▶";
  if (event_idx <= 0) {
    event_idx = -1; t_ns = 0; highlight_event_idx = -1;
    scrubber.value = t_ns; render(); return;
  }
  // Walk back to the last event with strictly smaller at than current.
  let target = event_idx - 1;
  const here_t = events[event_idx].at;
  while (target > 0 && events[target].at >= here_t) target--;
  event_idx = target;
  t_ns = events[target].at;
  highlight_event_idx = target;
  scrubber.value = t_ns;
  render();
}

// Event-step: one event at a time (fine-grained; lets you read slot/
// fire/consume events individually).
function step_forward_event() {
  if (animating) return;
  playing = false; document.getElementById("play").textContent = "▶";
  if (event_idx + 1 >= events.length) return;
  const next = event_idx + 1;
  animate_step_to(events[next].at, next);
}
function step_backward_event() {
  if (animating) return;
  playing = false; document.getElementById("play").textContent = "▶";
  if (event_idx <= 0) {
    event_idx = -1; t_ns = 0; highlight_event_idx = -1;
  } else {
    event_idx--;
    t_ns = events[event_idx].at;
    highlight_event_idx = event_idx;
  }
  scrubber.value = t_ns; render();
}

// Default step (button + arrow keys without shift): time-step — you
// want motion, not ten clicks of slot/fire chatter before anything
// visible happens.
const step_forward = step_forward_time;
const step_backward = step_backward_time;

document.getElementById("step-fwd").addEventListener("click", step_forward);
document.getElementById("step-back").addEventListener("click", step_backward);

window.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "BUTTON") return;
  if (e.key === "ArrowRight") {
    if (e.shiftKey) step_forward_event(); else step_forward_time();
    e.preventDefault();
  } else if (e.key === "ArrowLeft") {
    if (e.shiftKey) step_backward_event(); else step_backward_time();
    e.preventDefault();
  } else if (e.key === " ") {
    document.getElementById("play").click();
    e.preventDefault();
  }
});

document.getElementById("play").addEventListener("click", () => {
  playing = !playing;
  document.getElementById("play").textContent = playing ? "❚❚" : "▶";
  if (playing) requestAnimationFrame(step);
});
document.getElementById("speed").addEventListener("click", () => {
  speed_idx = (speed_idx + 1) % SPEEDS.length;
  speed = SPEEDS[speed_idx];
  document.getElementById("speed").textContent = speed + "×";
});

let last_real = null;
function step(now) {
  if (!playing) { last_real = null; return; }
  if (last_real !== null) {
    const dt = (now - last_real) / 1000;
    t_ns += dt * NS_PER_REAL_SEC * speed;
    if (t_ns >= duration) { t_ns = duration; playing = false; document.getElementById("play").textContent = "▶"; }
  }
  last_real = now;
  event_idx = latest_event_before(t_ns);
  highlight_event_idx = -1;
  scrubber.value = t_ns;
  render();
  if (playing) requestAnimationFrame(step);
}

// ---------- rendering ----------
const stage = document.getElementById("stage");
const side = document.getElementById("side");

// Effective state cursor. Everything reconstructed from the event log
// uses this — not t_ns — so same-instant events progressively reveal
// the queue instead of all appearing at once.
//
// During animation (animating=true): the cursor is "frozen" at where
// the user has actually stepped to (event_idx), so visible discrete
// state doesn't leap ahead of what they've acknowledged. The t_ns
// interpolation is ONLY used for packet-motion positions.
//
// While playing or scrubbing: cursor tracks the latest event ≤ t_ns.
function state_cursor() {
  if (animating) {
    // Apply events whose at_ns ≤ t_ns, but don't exceed the step
    // target. This makes same-instant events "become applied" as we
    // cross their instant, which is what reveals the queue mid-step.
    return Math.min(anim_target_idx, latest_event_before(t_ns));
  }
  if (highlight_event_idx >= 0) return highlight_event_idx;
  return latest_event_before(t_ns);
}

// Slots reflect the latest SlotWritten event with event-idx ≤ cursor.
function slots_at(nid, cursor) {
  const m = slot_writes.get(nid);
  if (!m) return new Map();
  const out = new Map();
  for (const [slot, writes] of m) {
    // Linear scan backwards — writes are small per slot.
    for (let i = writes.length - 1; i >= 0; i--) {
      if (writes[i].idx <= cursor) { out.set(slot, writes[i].value); break; }
    }
  }
  return out;
}

// Queue contents: packets whose deliver event is ≤ cursor AND whose
// consume event (if any) is > cursor.
function queue_at(nid, cursor) {
  const out = [];
  for (const p of packets.values()) {
    if (p.to !== nid) continue;
    if (p.deliver_idx === undefined || p.deliver_idx > cursor) continue;
    if (p.consume_idx !== undefined && p.consume_idx <= cursor) continue;
    out.push(p);
  }
  out.sort((a, b) => a.deliver_idx - b.deliver_idx);
  return out;
}

function format_value(v, depth=0) {
  if (v === null) return "nil";
  if (typeof v === "number") return v.toString();
  if (typeof v === "boolean") return v.toString();
  if (typeof v === "string") return '"' + v + '"';
  if (typeof v === "object") {
    if ("_noderef" in v) return "→" + v._noderef;
    if ("_samples" in v) {
      const s = v._samples;
      return `[Samples ${s.items.length}/${s.cap}]`;
    }
    if ("tag" in v) {
      if (v.payload === null) return v.tag;
      return v.tag + "(" + format_value(v.payload, depth+1) + ")";
    }
    // record
    if (depth > 1) return "{…}";
    const entries = Object.entries(v).map(([k, vv]) => k + ":" + format_value(vv, depth+1));
    return "{" + entries.join(", ") + "}";
  }
  return String(v);
}

function node_alive_at(nid, t) {
  const life = node_life.get(nid);
  if (!life) return false;
  if (life.spawn_at > t) return false;
  if (life.despawn_at !== undefined && life.despawn_at <= t) return false;
  return true;
}

// A node is "firing" if a RuleFired event at the current time is
// within ~3ms sim-time of now. Gives a brief visual pulse.
// If we're stepping, also flash the node from the highlighted event.
function firing_flash(nid, t) {
  const PULSE = 3_000_000; // 3ms
  if (highlight_event_idx >= 0) {
    const hi = events[highlight_event_idx];
    if (hi && hi.k === "fire" && hi.node === nid) return true;
    if (hi && (hi.k === "consume" || hi.k === "deliver") && hi.to === nid) return true;
    if (hi && hi.k === "slot" && hi.node === nid) return true;
    if (hi && hi.k === "consume" && hi.by === nid) return true;
  }
  for (let i = events.length - 1; i >= 0; i--) {
    const ev = events[i];
    if (ev.at > t) continue;
    if (t - ev.at > PULSE) break;
    if (ev.k === "fire" && ev.node === nid) return true;
  }
  return false;
}

function describe_event(ev) {
  if (!ev) return "—";
  const nn = id => { const n = nodes.get(id); return n ? n.name : ("#"+id); };
  switch (ev.k) {
    case "fire":    return `${nn(ev.node)} fires ${ev.rule}`;
    case "slot":    return `${nn(ev.node)}.${ev.slot} ← ${format_value(ev.value)}`;
    case "emit":    return `${nn(ev.from)} → ${nn(ev.to)} (pkt ${ev.packet})`;
    case "deliver": return `pkt ${ev.packet} arrives at ${nn(ev.to)}`;
    case "consume": return `${nn(ev.by)} consumes pkt ${ev.packet} via ${ev.rule}`;
    case "metric":  return `${nn(ev.node)} · ${ev.name} = ${format_value(ev.value)}`;
    case "clock":   return `clock → ${(ev.to/1e6).toFixed(3)} ms`;
    case "spawn":   return `spawn ${nn(ev.node)} from ${ev.template}`;
    case "despawn": return `despawn ${nn(ev.node)}`;
    default:        return ev.k;
  }
}

function render() {
  const cursor = state_cursor();

  // Clear stage.
  stage.innerHTML = "";

  // Layer 1: edges
  for (const e of edges.values()) {
    const a = nodes.get(e.from); const b = nodes.get(e.to);
    if (!a || !b) continue;
    if (!node_alive_at(e.from, t_ns) || !node_alive_at(e.to, t_ns)) continue;
    const line = document.createElementNS(SVG_NS, "line");
    line.setAttribute("x1", a.x); line.setAttribute("y1", a.y);
    line.setAttribute("x2", b.x); line.setAttribute("y2", b.y);
    line.setAttribute("class", "edge-line");
    stage.appendChild(line);
  }

  // Layer 2: in-flight packets (interpolate) with tag labels + color.
  //
  // Visibility trick: map the natural [0,1] fraction onto [0.18, 0.82]
  // on the visible edge. This way a just-emitted packet (frac≈0) is
  // clearly off its source node instead of overlapping it, and a
  // just-arrived packet (frac≈1) doesn't hide inside its destination.
  // This loses a bit of precision on exact position, but it's worth it
  // for legibility — you can always read whose emit/deliver it was.
  const pinned = new Set();
  if (highlight_event_idx >= 0) {
    const hi = events[highlight_event_idx];
    if (hi && hi.packet !== undefined) pinned.add(hi.packet);
  }
  for (const [pid, p] of packets) {
    // Visible iff emit event has been applied AND deliver event hasn't.
    // This way, between an emit and its deliver (possibly across many
    // same-instant events), the packet is always visible on its edge.
    const emitted = p.emit_idx !== undefined && p.emit_idx <= cursor;
    const delivered_cursor = p.deliver_idx !== undefined && p.deliver_idx <= cursor;
    const in_flight = emitted && !delivered_cursor;
    const is_pinned = pinned.has(pid);
    if (!in_flight && !is_pinned) continue;
    const a = nodes.get(p.from); const b = nodes.get(p.to);
    if (!a || !b) continue;
    // Position based on t_ns for smooth interpolation during animation.
    const raw_frac = in_flight
      ? (t_ns - p.emitted_at) / Math.max(1, p.arrives_at - p.emitted_at)
      : (t_ns <= p.emitted_at ? 0 : 1);
    // Compress into the visible middle section so packets never hide
    // inside source or destination node circles.
    const frac = 0.18 + Math.max(0, Math.min(1, raw_frac)) * 0.64;
    const x = a.x + (b.x - a.x) * frac;
    const y = a.y + (b.y - a.y) * frac;
    const g = document.createElementNS(SVG_NS, "g");
    g.setAttribute("transform", `translate(${x},${y})`);
    const c = document.createElementNS(SVG_NS, "circle");
    c.setAttribute("r", is_pinned ? 8 : 6);
    c.setAttribute("fill", tag_color(p.tag || "?"));
    if (is_pinned) { c.setAttribute("stroke", "#fff"); c.setAttribute("stroke-width", "1.8"); }
    g.appendChild(c);
    const label = document.createElementNS(SVG_NS, "text");
    label.setAttribute("text-anchor", "middle");
    label.setAttribute("y", -11);
    label.setAttribute("class", "pkt-label");
    label.textContent = p.tag || "";
    g.appendChild(label);
    stage.appendChild(g);
  }

  // Layer 3: nodes — with inbox chips hanging below showing the actual
  // queued packets (not just a count). This makes contention visible.
  for (const n of nodes.values()) {
    if (!node_alive_at(n.id, t_ns)) continue;
    const g = document.createElementNS(SVG_NS, "g");
    g.setAttribute("transform", `translate(${n.x},${n.y})`);

    const c = document.createElementNS(SVG_NS, "circle");
    c.setAttribute("r", 26);
    c.setAttribute("class", "node-circle" + (firing_flash(n.id, t_ns) ? " firing" : ""));
    g.appendChild(c);

    const label = document.createElementNS(SVG_NS, "text");
    label.setAttribute("text-anchor", "middle");
    label.setAttribute("y", 4);
    label.textContent = n.name;
    g.appendChild(label);

    const q = queue_at(n.id, cursor);
    // Draw each queued packet as a chip to the right of the node.
    // Layout: vertical stack, oldest at top.
    q.forEach((p, i) => {
      const chipG = document.createElementNS(SVG_NS, "g");
      chipG.setAttribute("transform", `translate(40,${-20 + i * 18})`);
      const rect = document.createElementNS(SVG_NS, "rect");
      const tag = p.tag || "?";
      const w = Math.max(28, tag.length * 7 + 10);
      rect.setAttribute("x", 0); rect.setAttribute("y", -8);
      rect.setAttribute("width", w); rect.setAttribute("height", 16);
      rect.setAttribute("rx", 3);
      rect.setAttribute("fill", tag_color(tag));
      rect.setAttribute("fill-opacity", "0.35");
      rect.setAttribute("stroke", tag_color(tag));
      rect.setAttribute("stroke-width", "1");
      chipG.appendChild(rect);
      const txt = document.createElementNS(SVG_NS, "text");
      txt.setAttribute("x", w / 2); txt.setAttribute("y", 4);
      txt.setAttribute("text-anchor", "middle");
      txt.setAttribute("class", "chip-label");
      txt.textContent = tag;
      chipG.appendChild(txt);
      g.appendChild(chipG);
    });
    stage.appendChild(g);
  }

  // time + event display
  document.getElementById("t-display").textContent = "t = " + (t_ns / 1_000_000).toFixed(3) + " ms";
  const evt_line = document.getElementById("evt-display");
  if (highlight_event_idx >= 0) {
    evt_line.textContent = "#" + (highlight_event_idx + 1) + "/" + events.length + " — " + describe_event(events[highlight_event_idx]);
  } else {
    evt_line.textContent = events.length + " events · ← → step time · shift+← → step events · space = play";
  }

  // Side panel: slots per live node, recent metrics.
  const rows = [];
  for (const n of nodes.values()) {
    if (!node_alive_at(n.id, t_ns)) continue;
    const sv = slots_at(n.id, cursor);
    if (sv.size === 0) continue;
    const slot_rows = [...sv.entries()].map(([k, v]) =>
      `<div class="slot"><span>${k}</span><span class="v">${format_value(v).replace(/</g,"&lt;")}</span></div>`
    ).join("");
    rows.push(`<div class="node-panel"><div class="name">${n.name}</div>${slot_rows}</div>`);
  }

  // Recent metrics (last 15, cursor-bounded)
  const recent = [];
  for (let i = Math.min(events.length - 1, cursor); i >= 0 && recent.length < 15; i--) {
    const ev = events[i];
    if (ev.k === "metric") {
      const n = nodes.get(ev.node);
      recent.push(`<div class="metric">${(ev.at/1_000_000).toFixed(2)}ms · ${n ? n.name : ev.node} · ${ev.name} = ${format_value(ev.value)}</div>`);
    }
  }

  // Event trail: show the last ~30 events up to and including the cursor.
  const END_IDX = cursor;
  const trail = [];
  const start = Math.max(0, END_IDX - 30);
  for (let i = start; i <= END_IDX; i++) {
    const ev = events[i];
    if (!ev || ev.k === "clock") continue;
    const hi = i === highlight_event_idx ? " hi" : "";
    trail.push(`<div class="evt${hi}"><span class="et">${(ev.at/1e6).toFixed(3)}ms</span> ${describe_event(ev)}</div>`);
  }

  side.innerHTML =
    `<h2>Slots</h2>${rows.join("")}` +
    `<h2>Recent Metrics</h2>${recent.join("") || "<div style='color:var(--dim)'>none</div>"}` +
    `<h2>Event Trail</h2>${trail.join("") || "<div style='color:var(--dim)'>none</div>"}`;
}

document.getElementById("speed").textContent = speed + "×";
render();
</script>
</body>
</html>
