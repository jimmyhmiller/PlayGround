[package]
name = "jsir-convert"
version = "0.1.0"
edition.workspace = true
license.workspace = true

# ast2hir: lower the JSIR AST (jsir-ast) into the JSIR/JSHIR IR (jsir-ir),
# reproducing upstream's post-order, l-value/r-value, region-building lowering.

[dependencies]
jsir-ast = { path = "../jsir-ast" }
jsir-ir = { path = "../jsir-ir" }

[dev-dependencies]
jsir-oracle = { path = "../jsir-oracle" }
serde_json = { version = "1", features = ["preserve_order"] }
