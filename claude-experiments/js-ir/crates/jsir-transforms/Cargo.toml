[package]
name = "jsir-transforms"
version = "0.1.0"
edition.workspace = true
license.workspace = true

# MLIR-free IR-to-IR transform passes. First pass: dead code elimination,
# driven by the constant-propagation dataflow analysis (a more powerful
# variant of upstream `maldoca/js/ir/transforms/dead_code_elimination`, which
# only inspects syntactic boolean literals).

[dependencies]
jsir-ir = { path = "../jsir-ir" }
jsir-analyses = { path = "../jsir-analyses" }
jsir-swc = { path = "../jsir-swc" }
