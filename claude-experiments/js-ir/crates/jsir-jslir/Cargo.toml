[package]
name = "jsir-jslir"
version = "0.0.0"
edition.workspace = true
license.workspace = true
rust-version.workspace = true

# JSLIR: a CFG/SSA dialect built on the generic jsir-ir op substrate, for the
# React-compiler port. `build_jslir` flattens JSHIR's structured control flow
# (jshir.if_statement/while_statement/...) into basic blocks + terminators;
# `lift_jslir` rebuilds the structured form so the existing hir2ast/ast2source
# path emits JS. The React passes (later) operate on the JSLIR CFG.

[dependencies]
jsir-ir = { path = "../jsir-ir" }
# Optional: the real React Compiler HIR (Rust port, vendored under
# vendor/react-compiler-rust). Enables a genuine second `Cfg` backend so the
# shared CFG algorithms are proven to run on both IRs. Off by default because the
# upstream crate is edition 2024 and not needed for the JSLIR pipeline itself.
react_compiler_hir = { path = "../../vendor/react-compiler-rust/crates/react_compiler_hir", optional = true }

[features]
react-hir = ["dep:react_compiler_hir"]

[dev-dependencies]
jsir-swc = { path = "../jsir-swc" }
# For the cross-backend test (building a React HIR by hand); same version the
# vendored react_compiler_hir uses, so the IndexMap types unify.
indexmap = "2"
