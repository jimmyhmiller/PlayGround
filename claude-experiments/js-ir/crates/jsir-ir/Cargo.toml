[package]
name = "jsir-ir"
version = "0.1.0"
edition.workspace = true
license.workspace = true

# MLIR-free IR model (ops/regions/blocks/values + attributes) and a textual
# printer byte-compatible with MLIR's generic operation format, as emitted by
# upstream jsir's `ast2hir` pass.

[dependencies]
num-bigint = "0.4.6"
num-integer = "0.1"
num-traits = "0.2"

[dev-dependencies]
jsir-oracle = { path = "../jsir-oracle" }
